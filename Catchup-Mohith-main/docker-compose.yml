# /home/mohith/Catchup-Mohith/docker-compose.yml
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: >
      redis-server --maxmemory 256mb
      --maxmemory-policy allkeys-lru --save "" --appendonly no
    volumes:
      - redisauth:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./:/workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal-server:
        condition: service_started
    env_file: .env
    environment:
      PYTHONPATH: /workspace

  temporal-server:
    image: temporalio/auto-setup:1.22
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: db
      POSTGRES_DB: temporal
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "7233:7233"

  temporal-worker:
    build: ./backend
    command: python -m app.temporal.worker
    volumes:
      - ./backend:/app
      - ./:/workspace
    depends_on:
      - temporal-server
      - api
    env_file: .env
    environment:
      PYTHONPATH: /workspace

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "corepack enable && CI=true pnpm install --no-frozen-lockfile && pnpm dev --host 0.0.0.0 --port 5173"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4
    profiles: ["dev-tools"]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

volumes:
  pgdata:
  redisauth:
  frontend_node_modules:
