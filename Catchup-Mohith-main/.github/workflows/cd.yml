# /home/mohith/Catchup-Mohith/.github/workflows/cd.yml
name: CD

on:
  push:
    branches:
      - main

jobs:
  ci-gate:
    name: Run CI checks before deployment
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push temporal-worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/temporal-worker:latest
            ghcr.io/${{ github.repository }}/temporal-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify success
        if: needs.build-and-push.result == 'success'
        run: |
          echo "## ✅ StockBridge Deployment Complete" \
            >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| api | \`${{ github.sha }}\` |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| temporal-worker | \`${{ github.sha }}\` |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`${{ github.sha }}\` |" \
            >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" \
            >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" \
            >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" \
            >> $GITHUB_STEP_SUMMARY

      - name: Notify failure
        if: needs.build-and-push.result != 'success'
        run: |
          echo "## ❌ StockBridge Deployment Failed" \
            >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build and push failed for commit \
            \`${{ github.sha }}\`." >> $GITHUB_STEP_SUMMARY
          echo "Check the build-and-push job logs." \
            >> $GITHUB_STEP_SUMMARY
          exit 1
