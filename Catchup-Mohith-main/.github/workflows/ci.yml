# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
      INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
      CORS_ORIGINS: '["http://localhost:5173"]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - name: Lint backend
        run: |
          ruff check backend/
          black --check backend/

  backend-unit-tests:
    runs-on: ubuntu-latest
    needs: backend-lint
    env:
      DATABASE_URL: postgresql+asyncpg://stockbridge:stockbridge@localhost/stockbridge_test
      TEST_DATABASE_URL: postgresql+asyncpg://stockbridge:stockbridge@localhost/stockbridge_test
      POSTGRES_USER: stockbridge
      POSTGRES_PASSWORD: stockbridge
      POSTGRES_DB: stockbridge_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SENDGRID_API_KEY: dummy
      SENDGRID_FROM_EMAIL: test@test.com
      INITIAL_ADMIN_PASSWORD: TestPass123!
      CORS_ORIGINS: '["http://localhost:5173"]'
      TEMPORAL_HOST: localhost
      TEMPORAL_PORT: "7233"
      TEMPORAL_NAMESPACE: default
      TEMPORAL_DB: temporal
      TEMPORAL_TASK_QUEUE: stockbridge-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run backend unit tests
        run: python -m pytest backend/tests/unit/ -v --tb=short

  backend-integration-tests:
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: stockbridge_test
          POSTGRES_USER: stockbridge
          POSTGRES_PASSWORD: stockbridge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://stockbridge:stockbridge@localhost/stockbridge_test
      TEST_DATABASE_URL: postgresql+asyncpg://stockbridge:stockbridge@localhost/stockbridge_test
      POSTGRES_USER: stockbridge
      POSTGRES_PASSWORD: stockbridge
      POSTGRES_DB: stockbridge_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      SENDGRID_API_KEY: dummy
      SENDGRID_FROM_EMAIL: test@test.com
      INITIAL_ADMIN_PASSWORD: TestPass123!
      CORS_ORIGINS: '["http://localhost:5173"]'
      TEMPORAL_HOST: localhost
      TEMPORAL_PORT: "7233"
      TEMPORAL_NAMESPACE: default
      TEMPORAL_DB: temporal
      TEMPORAL_TASK_QUEUE: stockbridge-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run migrations
        working-directory: backend
        run: PYTHONPATH=.. alembic upgrade head

      - name: Seed integration database
        run: |
          PYTHONPATH=. python scripts/seed.py

      - name: Run backend integration tests
        working-directory: backend
        run: |
          PYTHONPATH=.. python -m pytest tests/integration/test_*_integration.py -v --tb=short

  frontend-lint:
    runs-on: ubuntu-latest
    env:
      PNPM_STORE_PATH: ~/.pnpm-store
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('client/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: client
        run: pnpm lint

      - name: Typecheck frontend
        working-directory: client
        run: pnpm tsc --noEmit

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    env:
      PNPM_STORE_PATH: ~/.pnpm-store
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('client/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: client
        run: pnpm build
